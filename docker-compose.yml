version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: clinical-postgres
    environment:
      POSTGRES_DB: clinical_appointments
      POSTGRES_USER: clinical
      POSTGRES_PASSWORD: clinical
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  mailhog:
    image: mailhog/mailhog
    container_name: clinical-mailhog
    ports:
      - "8025:8025"

  backend:
    build:
      context: ./backend
    container_name: clinical-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clinical_appointments
      SPRING_DATASOURCE_USERNAME: clinical
      SPRING_DATASOURCE_PASSWORD: clinical
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      APP_REQUIRE_SSL: "false"
      APP_JWT_SECRET: ZmFrZS1jbGluaWNhbC1hcHBvaW50bWVudC1zZWNyZXQta2V5LW11c3QtYmUtbG9uZy1lbm91Z2gtMTIzNDU2
    depends_on:
      - postgres
      - mailhog
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: clinical-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: clinical-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: clinical-prometheus
    depends_on:
      - backend
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: clinical-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    ports:
      - "3001:3000"

volumes:
  postgres-data:
